name: Frontend CI/CD Pipeline
 
on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-frontend:${{ github.sha }} ./frontend

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-frontend:${{ github.sha }}

      - name: Update Kubernetes YAML
        run: |
          sed -i "s|image:.*employee-frontend.*|image: ${{ secrets.DOCKER_USERNAME }}/employee-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      - name: Commit & push YAML change
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/frontend.yaml
          git commit -m "update frontend image ${{ github.sha }}"
          git push
